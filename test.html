<div id="status">Testing...</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const URL = 'https://xflhsiqtovlsyylntacn.supabase.co';
// Paste your anon key below between the quotes
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhmbGhzcXZ0b3Zsc3l5bG50YWNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNjc0MzgsImV4cCI6MjA5NTg0MzQzOH0.3VcIotQ7FISFLyBanvkzK9e1RTk43oeGRVkHgHKBYaU';

const el = document.getElementById('status');

if (KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhmbGhzcXZ0b3Zsc3l5bG50YWNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNjc0MzgsImV4cCI6MjA5NTg0MzQzOH0.3VcIotQ7FISFLyBanvkzK9e1RTk43oeGRVkHgHKBYaU') {
  el.innerHTML = '<p style="color:yellow">⚠ You need to paste your anon key into this file</p>';
} else {
  try {
    const sb = supabase.createClient(URL, KEY);
    sb.auth.getSession().then(({data, error}) => {
      if (error) {
        el.innerHTML = '<p style="color:red">❌ Error: ' + error.message + '</p>';
      } else {
        el.innerHTML = '<p style="color:lime">✅ Supabase connected successfully! Now try login below.</p>' +
          '<br><input id="em" placeholder="email" style="padding:8px;margin:4px;width:250px"><br>' +
          '<input id="pw" type="password" placeholder="password" style="padding:8px;margin:4px;width:250px"><br>' +
          '<button onclick="doLogin()" style="padding:10px 20px;margin:8px;cursor:pointer">Test Login</button>' +
          '<div id="result"></div>';
      }
    });
  } catch(e) {
    el.innerHTML = '<p style="color:red">❌ SDK Error: ' + e.message + '</p>';
  }
}

async function doLogin() {
  const sb = supabase.createClient(URL, KEY);
  const {data, error} = await sb.auth.signInWithPassword({
    email: document.getElementById('em').value,
    password: document.getElementById('pw').value
  });
  document.getElementById('result').innerHTML = error 
    ? '<p style="color:red">❌ ' + error.message + '</p>'
    : '<p style="color:lime">✅ Logged in as: ' + data.user.email + '</p>';
}
</script>
</body>
</html>
